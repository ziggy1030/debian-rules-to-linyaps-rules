version: "${ll_version}"

package:
  id: ${package_id}
  name: "${app_name}"
  version: ${ll_version}
  kind: app
  architecture: ${linyaps_arch}
  description: |
    ${description}

base: ""
runtime: ""

buildext:
  apt:
    build_depends: # 构建时依赖，仅在构建环境中安装
      - build-essential
      - cmake
      - dh-sequence-kf6
      - extra-cmake-modules
      - gettext
      - libkf6config-dev
      - libkf6coreaddons-dev
      - libkf6crash-dev
    depends: # 运行时依赖，会包含在最终的应用或运行时中
      - git
      - clang-format
      - libsecret-1-0
      - shfmt
      - golang-go
      - gopls
      - zsh

command: ""

build: |
  ##Extract res
  # files/ 映射到 /usr/ 目录
  # binary/ 的内容直接对应 $prefix/ (files/)
  # pak_linyaps.sh 已处理路径转换和软链
  cp -rf /project/binary/* ${prefix}/

  # 复制桌面文件、图标等资源
  cp -rf /project/files_res/* ${prefix}/

  # Add an identity for LLM
  touch ${prefix}/.linyaps_genius
  chmod -R 755 ${prefix}
