# 项目分析结果 — kate (cmake)
# 生成时间: 2026-07-07
# 分析路径: debian 规则分析 (路径 A)

# ============================================================
# 基本信息
# ============================================================
pkgName: kate
pkgDescription: "powerful text editor"
baseline: "4:25.04.3-2deepin1"

# ============================================================
# 构建工具
# ============================================================
build_tool: cmake
build_tool_type: cmake

# ============================================================
# 构建依赖 (从 debian/control Build-Depends 合并去重)
# ============================================================
build_depends:
  - debhelper-compat (= 13)
  - dh-sequence-kf6
  - cmake (>= 3.16~)
  - extra-cmake-modules (>= 6.0.0~)
  - gettext
  - libkf6config-dev (>= 6.0.0~)
  - libkf6coreaddons-dev (>= 6.0.0~)
  - libkf6crash-dev (>= 6.0.0~)
  - libkf6dbusaddons-dev (>= 6.0.0~)
  - libkf6doctools-dev (>= 6.0.0~)
  - libkf6guiaddons-dev (>= 6.0.0~)
  - libkf6i18n-dev (>= 6.0.0~)
  - libkf6iconthemes-dev (>= 6.0.0~)
  - libkf6texteditor-dev (>= 6.0.0~)
  - libkf6textwidgets-dev (>= 6.0.0~)
  - libkf6windowsystem-dev (>= 6.0.0~)
  - libkf6xmlgui-dev (>= 6.0.0~)
  - pkgconf
  - qt6-base-dev (>= 6.5.0~)
  - qt6-base-private-dev (>= 6.5.0~)
  - qt6-declarative-dev (>= 6.5.0~)
  - xauth
  - xvfb

# ============================================================
# 依赖检测状态 (apt-get build-dep --dry-run)
# ============================================================
dep_status:
  status: available
  available_pkgs:
    - libeditorconfig0
    - libjs-underscore
    - libkf6syntaxhighlighting-dev
    - libkf6texteditor-bin
    - libkf6texteditor-data
    - libkf6texteditor-dev
    - libkf6texteditor6
    - qml6-module-org-kde-syntaxhighlighting
    - xvfb
  missing_pkgs: []

# ============================================================
# 编译参数及默认值
# ============================================================
build_args:
  - name: CMAKE_INSTALL_PREFIX
    default: "/usr"
  - name: CMAKE_BUILD_TYPE
    default: "Release"

# ============================================================
# 二进制包列表 (来自 debian/control Package 条目)
# ============================================================
binaryPackages:
  - kate
  - kate-data
  - kwrite

# ============================================================
# 资源文件 (合并所有 install 文件)
# ============================================================
resources:
  install:
    - src: usr/bin/kwrite
      dest: "/"
    - src: usr/share/applications/org.kde.kwrite.desktop
      dest: "/"
    - src: usr/share/doc/HTML/*/kwrite/
      dest: "/"
    - src: usr/share/icons/hicolor/*/apps/kwrite.png
      dest: "/"
    - src: usr/share/metainfo/org.kde.kwrite.appdata.xml
      dest: "/"
    - src: usr/bin/kate
      dest: "/"
    - src: usr/lib/*/libkateprivate.so.*
      dest: "/"
    - src: usr/lib/*/qt6/plugins/kf6/ktexteditor/
      dest: "/"
    - src: usr/share/applications/org.kde.kate.desktop
      dest: "/"
    - src: usr/share/metainfo/org.kde.kate.appdata.xml
      dest: "/"
    - src: usr/share/doc/HTML/*/kate/
      dest: "/"
    - src: usr/share/doc/HTML/*/katepart/
      dest: "/"
    - src: usr/share/icons/hicolor/*/apps/kate.png
      dest: "/"
    - src: usr/share/icons/hicolor/scalable/apps/kate.svg
      dest: "/"
    - src: usr/share/icons/hicolor/scalable/apps/kwrite.svg
      dest: "/"
    - src: usr/share/kateproject/kateproject.example
      dest: "/"
    - src: usr/share/katexmltools/
      dest: "/"
    - src: usr/share/locale/*/LC_MESSAGES/*kate*.mo
      dest: "/"
    - src: usr/share/locale/*/LC_MESSAGES/ktexteditorpreviewplugin.mo
      dest: "/"
    - src: usr/share/locale/*/LC_MESSAGES/lspclient.mo
      dest: "/"
    - src: usr/share/locale/*/LC_MESSAGES/tabswitcherplugin.mo
      dest: "/"
    - src: usr/share/locale/*/LC_MESSAGES/rainbowparens.mo
      dest: "/"
    - src: usr/share/locale/*/LC_MESSAGES/formatplugin.mo
      dest: "/"
    - src: usr/share/locale/*/LC_MESSAGES/rbqlplugin.mo
      dest: "/"
    - src: usr/share/man/*/man1/kate.1
      dest: "/"
    - src: usr/share/man/man1/kate.1
      dest: "/"

# ============================================================
# 构建规则摘要 (debian/rules)
# ============================================================
build_rules_summary:
  dh_sequence: "dh $@"
  override_dh_auto_test: "xvfb-run -a dh_auto_test --buildsystem=kf6 || true"
  debian_rules_flags: "DEB_BUILD_MAINT_OPTIONS=hardening=+all"
  arch_exclusions:
    failing_test_archs:
      - armel
      - armhf
      - hurd-amd64
      - hurd-i386
      - i386