version: "25.4.3.2"

package:
  id: "kate"
  name: "kate"
  version: "25.4.3.2"
  kind: app
  description: |
    Manage installed skills, Git subscriptions, and DeepinHub packages

base: org.deepin.base/25.2.2
runtime: org.deepin.runtime.dtk/25.2.2

command:
  - "gimp"

sources:
  - kind: archive
    url: https://share.cicd.getdeepin.org/ziggy-pool/kate_25.04.3.orig.tar.gz
    digest: dde1bec049fd4e48e988d3227145729dbe8f221b45197a7bede7fd03f30bd0c2 # 建议提供 sha256 哈希值
    name: kate-src

buildext:
  apt:
    build_depends: # 构建时依赖，仅在构建环境中安装
      - build-essential
      - cmake
      - dh-sequence-kf6
      - extra-cmake-modules
      - gettext
      - libkf6config-dev
      - libkf6coreaddons-dev
      - libkf6crash-dev
      - libkf6dbusaddons-dev
      - libkf6doctools-dev
      - libkf6guiaddons-dev
      - libkf6i18n-dev
      - libkf6iconthemes-dev
      - libkf6texteditor-dev
      - libkf6textwidgets-dev
      - libkf6windowsystem-dev
      - libkf6xmlgui-dev
      - pkgconf
      - qt6-base-dev
      - qt6-base-private-dev
      - qt6-declarative-dev
      - xauth
      - xvfb
    depends:
      - libperl5.36

build: |
  ##Extract res
  echo "Test"
  cd /project/linglong/sources/kate-src/kate-25.04.3/
  cmake -B build-linglong \
  -DCMAKE_INSTALL_PREFIX=$PREFIX \
  -DCMAKE_BUILD_TYPE=Release \
  -DBUILD_TESTING=OFF \
  -DCMAKE_INSTALL_LIBDIR=lib \
  -DCMAKE_SKIP_RPATH=ON
  cd build-linglong
  make -j$(nproc)
  make install
